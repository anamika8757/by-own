<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Zenvy | Checkout</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <h2 class="logo">Zenvy</h2>
</header>

<section class="checkout">
  <h2>Checkout</h2>

  <div class="checkout-container">

    <!-- ADDRESS FORM -->
    <div class="checkout-box">
      <h3>Delivery Address</h3>
      <input type="text" placeholder="Full Name" required>
      <input type="text" placeholder="Mobile Number" required>
      <input type="text" placeholder="House / Street" required>
      <input type="text" placeholder="City">
      <input type="text" placeholder="State">
      <input type="text" placeholder="Pincode">
    </div>

    <!-- PAYMENT -->
    <div class="checkout-box">
      <h3>Payment Method</h3>
      <label><input type="radio" name="pay" checked> Cash on Delivery</label><br>
      <label><input type="radio" name="pay"> UPI</label><br>
      <label><input type="radio" name="pay"> Debit / Credit Card</label>

      <h3 id="checkoutTotal"></h3>

      <button class="checkout-btn" onclick="placeOrder()">
        Place Order
      </button>
    </div>

  </div>
</section>

<script src="script.js"></script>
</body>
</html>
